services:
  - type: web
    name: ytdl-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --cookies cookies.txt --proxy socks5://test:test@103.159.218.218:1920
    envVars:
      - key: COOKIES_FILE
        value: cookies.txt
      - key: PROXY
        value: socks5://test:test@103.159.218.218:1920
